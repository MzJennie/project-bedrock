cart:
  fullnameOverride: carts
  app:
    persistence:
      provider: dynamodb
      dynamodb:
        tableName: project-bedrock-carts
        createTable: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

catalog:
  fullnameOverride: catalog
  app:
    persistence:
      provider: mysql
      endpoint: project-bedrock-mysql.ci5y884aql53.us-east-1.rds.amazonaws.com
      database: retailstore
      secret:
        create: true
        name: catalog-db
        username: bedrockadmin
        password: BedrockMySQL2026

checkout:
  fullnameOverride: checkout
  retail:
    checkout:
      endpoints:
        orders: http://orders:80

orders:
  fullnameOverride: orders
  app:
    persistence:
      provider: postgres
      endpoint: project-bedrock-postgres.ci5y884aql53.us-east-1.rds.amazonaws.com
      database: retailstore
      secret:
        create: true
        name: orders-db
        username: bedrockadmin
        password: BedrockPostgres2026
    messaging:
      provider: rabbitmq
      rabbitmq:
        create: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

ui:
  fullnameOverride: ui
  app:
    endpoints:
      catalog: http://catalog:80
      carts: http://carts:80
      checkout: http://checkout:80
      orders: http://orders:80
  ingress:
    enabled: true
    className: alb
    annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
